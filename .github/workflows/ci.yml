name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mikrocontrol
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: mikrocontrol_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mikrocontrol -d mikrocontrol_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://mikrocontrol:test-password@localhost:5432/mikrocontrol_test
      SECRET_KEY: ci-secret-key-not-for-production
      CORS_ORIGINS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: alembic upgrade head
      - run: alembic check
      - run: python -m unittest discover -s tests -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --omit=dev --audit-level=critical
